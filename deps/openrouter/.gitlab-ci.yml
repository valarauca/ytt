image: "rust:latest"
before_script:
  # restore cache
  - if [[ -n $ENABLE_CACHE || -n $RESTORE_CACHE ]]; then (cp -ruT .cargo/ $CARGO_HOME/ && rm -rf .cargo/) || true; fi
  # versions
  - rustup -vV
  - cargo -vV
  - rustc -vV;
  - cargo install cargo-sweep
  - cargo sweep -V
  # clear cache which was generated by old compiler versions
  - cargo sweep -i || true
  # 6 weeks from stable to stable
  - cargo sweep -t 42 || true

after_script:
  # save cache
  - if [[ $ENABLE_CACHE ]]; then mkdir -p .cargo/; cp -ruT $CARGO_HOME/ .cargo/; fi

stages:
  - lint
  - build
  - report
  - deploy

include:
  - '/ci/lint.yml'
  - '/ci/build.yml'
  - '/ci/report.yml'
  - '/ci/deploy.yml'
